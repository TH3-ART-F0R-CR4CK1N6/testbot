services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: universal-search-bot

    restart: unless-stopped

    env_file:
      - .env

    security_opt:
      - no-new-privileges:true

    cap_drop:
      - ALL

    read_only: true

    tmpfs:
      - /tmp:size=32m,mode=1777

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
