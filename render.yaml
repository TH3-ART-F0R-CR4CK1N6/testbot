services:
  - type: web
    name: universal-search-osint-bot
    runtime: python
    plan: free

    buildCommand: pip install --no-cache-dir -r requirements.txt
    startCommand: python bot.py

    healthCheckPath: /health

    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8

      - key: TELEGRAM_BOT_TOKEN
        sync: false

      - key: WEBHOOK_SECRET
        generateValue: true

      - key: RATE_LIMIT
        value: "10"

      - key: REQUEST_TIMEOUT
        value: "12"

      - key: LOG_LEVEL
        value: INFO
